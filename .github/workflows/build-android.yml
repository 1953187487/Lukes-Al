name: Build & Release Android APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          check-latest: true

      - name: Install Capacitor & dependencies
        run: |
          node --version
          npm --version
          npm init -y
          npm install @capacitor/cli @capacitor/core @capacitor/android --save

      - name: Initialize Capacitor
        run: |
          if [ ! -f capacitor.config.json ]; then
            npx cap init "Lukes-Al" "com.example.lukesal" --web-dir .
          fi

      - name: Add Android platform
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi

      - name: Sync to Android
        run: |
          cp index.html ./
          npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assemble${{ github.event.inputs.build_type || 'Debug' }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lukes-Al-${{ github.event.inputs.build_type || 'Debug' }}-apk
          path: android/app/build/outputs/apk/**/*.apk

      - name: Create / Update GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK_PATH=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          gh release create "${{ github.ref }}" "$APK_PATH" \
            --title "Release ${{ github.ref_name }}" \
            --notes "Automated build for ${{ github.ref_name }}" \
            || gh release upload "${{ github.ref }}" "$APK_PATH" --clobber
